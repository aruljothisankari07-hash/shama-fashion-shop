<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wishlist</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

.item{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}

.item img{
width:60px;
height:60px;
object-fit:cover;
border-radius:8px;
}

.buttons{
display:flex;
flex-direction:column;
gap:5px;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

.cart{
background:green;
color:white;
}

.remove{
background:red;
color:white;
}
</style>
</head>

<body>

<h1>❤️ My Wishlist</h1>

<div class="container" id="list"></div>

<script>
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let container = document.getElementById("list");

function render(){

container.innerHTML = "";

if(wishlist.length === 0){
container.innerHTML = "<h3 style='text-align:center'>No items in wishlist ❤️</h3>";
return;
}

wishlist.forEach((item,index)=>{
container.innerHTML += `
<div class="item">
<img src="${item.image}">

<div>
<h3>${item.name}</h3>
<p>₹${item.price}</p>
</div>

<div class="buttons">
<button class="cart" onclick="moveToCart(${index})">🛒 Add to Cart</button>
<button class="remove" onclick="removeItem(${index})">Remove</button>
</div>

</div>
`;
});
}

function moveToCart(index){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let item = wishlist[index];

let existing = cart.find(i => i.name === item.name);

if(existing){
existing.qty += 1;
}else{
cart.push({
name: item.name,
price: item.price,
qty: 1
});
}

localStorage.setItem("cart", JSON.stringify(cart));

wishlist.splice(index,1);
localStorage.setItem("wishlist", JSON.stringify(wishlist));

alert("Moved to cart 🛒");

render();
}

function removeItem(index){
wishlist.splice(index,1);
localStorage.setItem("wishlist", JSON.stringify(wishlist));
render();
}

render();
</script>

</body>
</html>
