<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.item{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

button{
cursor:pointer;
border:none;
padding:6px 10px;
border-radius:5px;
}

.remove{
background:#ff416c;
color:white;
}

.clear{
background:black;
color:white;
margin-top:10px;
width:100%;
padding:10px;
}

.pay{
background:green;
color:white;
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:15px;
}
</style>
</head>

<body>

<header>
<h1>🛒 My Cart</h1>
</header>

<div class="container">

<div id="items"></div>

<div class="total" id="total"></div>

<button class="pay" onclick="goPay()">Proceed to Payment</button>

<button class="clear" onclick="clearCart()">Clear Cart</button>

<br><br>
<a href="index.html">⬅ Back to Shop</a>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart(){

let container = document.getElementById("items");
container.innerHTML = "";

let total = 0;

cart.forEach((item,index)=>{

let div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<span>
${item.name} - ₹${item.price} × ${item.qty}
</span>

<div>
<button onclick="changeQty(${index}, -1)">-</button>
<button onclick="changeQty(${index}, 1)">+</button>
<button class="remove" onclick="removeItem(${index})">Remove</button>
</div>
`;

container.appendChild(div);

total += item.price * item.qty;
});

document.getElementById("total").innerText = "Total: ₹" + total;
}

function removeItem(index){
cart.splice(index,1);
localStorage.setItem("cart",JSON.stringify(cart));
loadCart();
}

function clearCart(){
cart = [];
localStorage.removeItem("cart");
loadCart();
}

function goPay(){
if(cart.length == 0){
alert("Cart is empty!");
return;
}
window.location.href = "payment.html";
}

loadCart();
function changeQty(index, change){

if(cart[index].qty + change <= 0){
cart.splice(index,1);
}else{
cart[index].qty += change;
}

localStorage.setItem("cart", JSON.stringify(cart));
loadCart();
}
</script>

</body>
</html>
