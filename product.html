<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Details</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.box{
max-width:500px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

img{
width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#111;
color:white;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#ff416c;
}
</style>
</head>

<body>

<div class="box" id="productBox"></div>

<script>
// get product index from URL
let params = new URLSearchParams(window.location.search);
let index = params.get("id");

let products = JSON.parse(localStorage.getItem("products")) || [];

let p = products[index];

document.getElementById("productBox").innerHTML = `
<img src="${p.image}">
<h2>${p.name}</h2>
<h3>₹${p.price}</h3>

<button onclick="addCart('${p.name}',${p.price})">🛒 Add to Cart</button>
<button onclick="addWishlist('${p.name}',${p.price},'${p.image}')">❤️ Wishlist</button>
`;

// CART
function addCart(name, price){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(i => i.name === name);

if(existing){
existing.qty += 1;
}else{
cart.push({name, price, qty:1});
}

localStorage.setItem("cart", JSON.stringify(cart));
alert("Added to cart 🛒");
}

// WISHLIST
function addWishlist(name, price, image){
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
wishlist.push({name, price, image});
localStorage.setItem("wishlist", JSON.stringify(wishlist));
alert("Added to wishlist ❤️");
}
</script>

</body>
</html>
