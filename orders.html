<!DOCTYPE html>
<html>
<head>
<title>My Orders</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>📦 My Orders</h1>

<div id="list"></div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

let container = document.getElementById("list");

if(orders.length === 0){
container.innerHTML = "<h3>No orders yet</h3>";
}

orders.forEach(order=>{
container.innerHTML += `
<div class="order">
<h3>🧾 Order</h3>
<p>💰 Amount: ₹${order.amount || 0}</p>
<p>📅 Date: ${order.date || "N/A"}</p>
</div>
`;
});
</script>

</body>
</html>
