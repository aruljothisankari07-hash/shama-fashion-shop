<!DOCTYPE html>
<html>
<head>
<title>Shirt Details</title>
</head>
<body>

<h1>Stylish Shirt</h1>

<img src="images/shirt.jpg" width="300">

<h2>₹499</h2>

<p>Comfortable cotton stylish shirt for daily wear.</p>

<button onclick="addCart('Shirt',499)">Add to Cart</button>

<br><br>
<a href="index.html">⬅ Back</a>

<script>
function addCart(name, price){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({name, price});
    localStorage.setItem("cart", JSON.stringify(cart));
    alert(name + " added to cart");
}
</script>

</body>
</html>
